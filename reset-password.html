<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استعادة كلمة المرور</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* تخصيص إضافي للصفحة */
        .reset-container {
            max-width: 450px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
            text-align: center;
        }
        .reset-container h2 {
            color: #1e3a8a;
            margin-bottom: 20px;
        }
        .reset-container p {
            color: #4b5563;
            margin-bottom: 25px;
            font-size: 0.95em;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #3b82f6;
            text-decoration: none;
            font-weight: bold;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .success-message {
            background: #d1fae5;
            color: #065f46;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .error-message {
            background: #fee2e2;
            color: #b91c1c;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
         
    </style>
</head>
<body>
    <div class="reset-container">
        <h2>🔐 استعادة كلمة المرور</h2>
        <p>أدخل بريدك الإلكتروني المسجل وسنرسل لك رابطاً لإعادة تعيين كلمة المرور.</p>

        <form id="reset-form">
            <input type="email" id="reset-email" placeholder="البريد الإلكتروني" required autocomplete="email">
            <button type="submit" id="reset-btn">إرسال رابط الاستعادة</button>
        </form>

        <div id="message-area"></div>

        <a href="admin-login.html" class="back-link">← العودة إلى تسجيل الدخول</a>
    </div>

    <script type="module">
        import { supabase } from './js/supabase-config.js';

        const form = document.getElementById('reset-form');
        const emailInput = document.getElementById('reset-email');
        const submitBtn = document.getElementById('reset-btn');
        const messageArea = document.getElementById('message-area');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            messageArea.innerHTML = '';
            const email = emailInput.value.trim();

            if (!email) {
                showMessage('الرجاء إدخال البريد الإلكتروني.', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = 'جاري الإرسال <span class="spinner"></span>';

            try {
                // رابط إعادة التعيين سيعيد المستخدم إلى صفحة update-password.html
                const redirectUrl = `${window.location.origin}/update-password.html`;
                const { error } = await supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: redirectUrl,
                });

                if (error) throw error;

                showMessage(
                    '✅ تم إرسال رابط استعادة كلمة المرور إلى بريدك الإلكتروني. يرجى التحقق من صندوق الوارد (وربما البريد المزعج).',
                    'success'
                );
                emailInput.value = '';
            } catch (error) {
                console.error(error);
                let errorText = 'حدث خطأ أثناء إرسال الرابط. حاول مرة أخرى.';
                if (error.message.includes('User not found')) {
                    errorText = 'لا يوجد حساب مرتبط بهذا البريد الإلكتروني.';
                }
                showMessage(errorText, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'إرسال رابط الاستعادة';
            }
        });

        function showMessage(msg, type) {
            messageArea.innerHTML = `<div class="${type === 'success' ? 'success-message' : 'error-message'}">${msg}</div>`;
        }
    </script>
</body>
</html>
