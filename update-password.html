<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعيين كلمة مرور جديدة</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .update-container {
            max-width: 450px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
            text-align: center;
        }
        .update-container h2 {
            color: #1e3a8a;
            margin-bottom: 20px;
        }
        .update-container p {
            color: #4b5563;
            margin-bottom: 25px;
            font-size: 0.95em;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #3b82f6;
            text-decoration: none;
            font-weight: bold;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .success-message {
            background: #d1fae5;
            color: #065f46;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .error-message {
            background: #fee2e2;
            color: #b91c1c;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .password-requirements {
            font-size: 0.8em;
            color: #6b7280;
            margin-top: 8px;
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="update-container">
        <h2>🔑 تعيين كلمة مرور جديدة</h2>
        <p>أدخل كلمة المرور الجديدة لحسابك.</p>

        <form id="update-form">
            <input type="password" id="new-password" placeholder="كلمة المرور الجديدة" required autocomplete="new-password">
            <input type="password" id="confirm-password" placeholder="تأكيد كلمة المرور" required autocomplete="new-password">
            <div class="password-requirements">يجب أن تحتوي على 8 أحرف على الأقل، تتضمن حروفاً وأرقاماً.</div>
            <button type="submit" id="update-btn">تحديث كلمة المرور</button>
        </form>

        <div id="message-area"></div>

        <a href="admin-login.html" class="back-link">← العودة إلى تسجيل الدخول</a>
    </div>

    <script type="module">
        import { supabase } from './js/supabase-config.js';

        const form = document.getElementById('update-form');
        const newPassInput = document.getElementById('new-password');
        const confirmPassInput = document.getElementById('confirm-password');
        const submitBtn = document.getElementById('update-btn');
        const messageArea = document.getElementById('message-area');

        // التحقق من وجود رمز الوصول في URL (للتأكد من أن المستخدم أتى من رابط إعادة التعيين)
        const hashParams = new URLSearchParams(window.location.hash.substring(1));
        const accessToken = hashParams.get('access_token');
        const refreshToken = hashParams.get('refresh_token');
        const type = hashParams.get('type');

        // إذا لم يكن هناك رمز، قد يكون المستخدم دخل يدوياً – نعرض رسالة
        if (!accessToken || type !== 'recovery') {
            messageArea.innerHTML = '<div class="error-message">⚠️ رابط غير صالح أو منتهي الصلاحية. يرجى طلب رابط جديد من صفحة "نسيت كلمة المرور".</div>';
            form.style.display = 'none';
        } else {
            // تسجيل الدخول بالرمز لاستعادة الجلسة
            (async () => {
                try {
                    const { error } = await supabase.auth.setSession({
                        access_token: accessToken,
                        refresh_token: refreshToken
                    });
                    if (error) throw error;
                    // الجلسة الآن نشطة، يمكن للمستخدم تغيير كلمة المرور
                } catch (err) {
                    console.error(err);
                    messageArea.innerHTML = '<div class="error-message">فشل التحقق من الرابط. حاول مرة أخرى أو اطلب رابطاً جديداً.</div>';
                    form.style.display = 'none';
                }
            })();
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            messageArea.innerHTML = '';

            const newPassword = newPassInput.value;
            const confirmPassword = confirmPassInput.value;

            // التحقق من قوة كلمة المرور (تطابق الشروط)
            const passwordRegex = /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{8,}$/;
            if (!passwordRegex.test(newPassword)) {
                showMessage('كلمة المرور يجب أن تكون 8 أحرف على الأقل وتحتوي على أحرف وأرقام.', 'error');
                return;
            }

            if (newPassword !== confirmPassword) {
                showMessage('كلمتا المرور غير متطابقتين.', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = 'جاري التحديث <span class="spinner"></span>';

            try {
                const { error } = await supabase.auth.updateUser({ password: newPassword });

                if (error) throw error;

                showMessage('✅ تم تغيير كلمة المرور بنجاح! سيتم توجيهك إلى صفحة تسجيل الدخول.', 'success');
                // تسجيل الخروج من الجلسة الحالية لتجنب أي التباس
                await supabase.auth.signOut();
                setTimeout(() => {
                    window.location.href = 'admin-login.html';
                }, 3000);
            } catch (error) {
                console.error(error);
                let errorText = 'حدث خطأ أثناء تحديث كلمة المرور. حاول مرة أخرى.';
                if (error.message.includes('expired')) {
                    errorText = 'الرابط منتهي الصلاحية. يرجى طلب رابط جديد.';
                }
                showMessage(errorText, 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'تحديث كلمة المرور';
            }
        });

        function showMessage(msg, type) {
            messageArea.innerHTML = `<div class="${type === 'success' ? 'success-message' : 'error-message'}">${msg}</div>`;
        }
    </script>
</body>
</html>
